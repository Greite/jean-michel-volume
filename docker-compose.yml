services:
  jean-michel-volume:
    # Option 1: Utiliser l'image pré-buildée depuis GHCR (recommandé)
    image: ghcr.io/greite/jean-michel-volume:latest

    # Option 2: Builder localement (commentez la ligne 'image' ci-dessus et décommentez ci-dessous)
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: jean-michel-volume
    ports:
      - "3000:3000"
    environment:
      # NextAuth Configuration
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}

      # Spotify API Configuration
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}

      # Debug Mode
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - NEXT_PUBLIC_DEBUG_MODE=${NEXT_PUBLIC_DEBUG_MODE:-false}

      # Node Environment
      - NODE_ENV=production
    restart: unless-stopped
    # Optionally use an env file
    # env_file:
    #   - .env.production
